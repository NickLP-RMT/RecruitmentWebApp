<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HR Admin</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container">
        <h1>HR Admin Dashboard</h1>
        <nav>
          <a href="/">Applicant View</a>
        </nav>
      </div>
    </header>

    <main class="container stack">
      <section class="card">
        <h2>ค้นหาและกรอง</h2>
        <div class="row">
          <input id="q" placeholder="ค้นหา ชื่อ/อีเมล/เลขอ้างอิง" />
          <select id="job">
            <option value="">ทุกตำแหน่ง</option>
            <option value="HR-001">HR Officer</option>
            <option value="IT-001">IT Support</option>
            <option value="ADM-001">Admin Officer</option>
            <option value="PROD-001">Production Staff</option>
          </select>
          <select id="status">
            <option value="">ทุกสถานะ</option>
            <option value="submitted">submitted</option>
            <option value="screening">screening</option>
            <option value="passed_screening">passed_screening</option>
            <option value="interview">interview</option>
            <option value="rejected">rejected</option>
            <option value="hired">hired</option>
          </select>
          <button id="searchBtn">ค้นหา</button>
        </div>
      </section>

      <section class="card">
        <h2>ผู้สมัคร</h2>
        <table>
          <thead>
            <tr>
              <th>Ref</th>
              <th>ชื่อ</th>
              <th>Email</th>
              <th>ตำแหน่ง</th>
              <th>คะแนน</th>
              <th>สถานะ</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="applicantsBody"></tbody>
        </table>
      </section>
    </main>

    <script src="./config.js"></script>
    <script src="./admin.js"></script>
  </body>
</html>
